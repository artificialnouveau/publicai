<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#001540"/>
      <stop offset="55%" stop-color="#00205b"/>
      <stop offset="100%" stop-color="#0077c8"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="20%" r="55%">
      <stop offset="0%" stop-color="rgba(0,180,216,0.30)"/>
      <stop offset="100%" stop-color="rgba(0,180,216,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="158" x2="1200" y2="158"/>
    <line x1="0" y1="316" x2="1200" y2="316"/>
    <line x1="0" y1="474" x2="1200" y2="474"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="120" font-size="20" font-weight="700" letter-spacing="4" fill="rgba(255,255,255,0.55)" text-transform="uppercase">
    AIRBUS FOR AI &middot; PUBLIC AI COMPANY SIMULATOR
  </text>

  <!-- Headline -->
  <text x="80" y="240" font-size="92" font-weight="900" letter-spacing="-3" fill="#ffffff">Who controls the AI</text>
  <text x="80" y="340" font-size="92" font-weight="900" letter-spacing="-3" fill="#ffffff">your country depends on?</text>

  <!-- Stat row -->
  <g transform="translate(80, 410)">
    <!-- Stat 1 -->
    <g>
      <text x="0" y="32" font-family="JetBrains Mono, monospace" font-size="48" font-weight="300" fill="#00b4d8">~80%</text>
      <text x="0" y="60" font-size="14" letter-spacing="1" fill="rgba(255,255,255,0.55)">chatbot share &middot; ChatGPT</text>
    </g>
    <!-- Divider -->
    <line x1="240" y1="0" x2="240" y2="65" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <!-- Stat 2 -->
    <g transform="translate(280, 0)">
      <text x="0" y="32" font-family="JetBrains Mono, monospace" font-size="48" font-weight="300" fill="#f0a500">$109B / $14B</text>
      <text x="0" y="60" font-size="14" letter-spacing="1" fill="rgba(255,255,255,0.55)">US vs EU AI investment 2024</text>
    </g>
  </g>

  <!-- Footer line -->
  <g transform="translate(80, 545)">
    <text x="0" y="0" font-size="18" letter-spacing="2" fill="rgba(255,255,255,0.5)" text-transform="uppercase">
      Assemble it &middot; stress-test it &middot; finance it
    </text>
    <text x="0" y="32" font-size="14" font-family="JetBrains Mono, monospace" fill="rgba(255,255,255,0.4)">www.artificialnouveau.com/publicai/airbus-for-ai</text>
  </g>

  <!-- Decorative monogram (top right) -->
  <g transform="translate(1040, 60)">
    <rect x="0" y="0" width="80" height="80" rx="18" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="3"/>
    <path d="M22 60 L40 22 L58 60" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="28" y1="48" x2="52" y2="48" stroke="rgba(255,255,255,0.85)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
